<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/styles.css">
    <link rel="icon" type="image/png" href="stickers/favicon.png">
    <title>MemeNest</title>
</head>
<body class="app main-layout" onload="onInit()">
    <div class="main-screen" onclick="onCloseMenu()"></div>

    <header class="main-header main-layout full align-center">
        <a class="main-logo" onclick="onPageChange(event)" href="?page=gallery" data-uri="gallery">MemeNest</a>
        <nav class="main-nav">
            <ul class="grid">
                <li><a onclick="onPageChange(event)" href="?page=gallery" data-uri="gallery">Gallery</a></li>
                <li><a onclick="onPageChange(event)" href="?page=editor" data-uri="editor">Editor</a></li>
                <li><a onclick="onPageChange(event)" href="?page=memes" data-uri="memes">Memes</a></li>
            </ul>
        </nav>
        <span class="current-page-label"></span>
        <button class="nav-btn" onclick="onToggleMenu(this)"><i class="fa-solid fa-bars"></i></button>
    </header>
    
    <main class="main-content-container main-layout full"></main>

    <div class="banners"><div class="banner"></div></div>

    <script src="https://kit.fontawesome.com/ed34b9feb9.js" crossorigin="anonymous"></script>
    <script src="js/utils/utils.service.js"></script>
    <script src="js/storage/storage.service.js"></script>
    <script src="js/ui/ui.service.js"></script>
    <script src="js/items/items.service.js"></script>
    <script src="js/page/page.controller.js"></script>
    <script src="js/page/page.service.js"></script>
    <script src="js/canvas/canvas.service.js"></script>
    <script src="js/canvas/canvas.controller.js"></script>
</body>
</html>
