<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/styles.css">
    <title>MemeNest</title>
</head>
<body class="app main-layout" onload="onInit()">
    <div class="main-screen" onclick="onCloseMenu()"></div>

    <header class="main-header main-layout full align-center">
        <div class="main-logo">MemeNest</div>
        <nav class="main-nav">
            <ul class="grid">
                <li><a onclick="onPageChange(event)" href="" data-uri="gallery">Gallery</a></li>
                <li><a onclick="onPageChange(event)" href="" data-uri="editor">Editor</a></li>
                <li><a onclick="onPageChange(event)" href="" data-uri="memes">Memes</a></li>
                <li><a onclick="onPageChange(event)" href="" data-uri="about">About</a></li>
            </ul>
        </nav>
        <button class="nav-btn" onclick="onToggleMenu(this)"><i class="fa-solid fa-bars"></i></button>
    </header>
    
    <main class="main-content-container main-layout full">
        <section class="gallery hide">
            <div class="filter-section">
                <input name="photos-search" placeholder="Search" class="search-bar" type="text" oninput="OnSetSearchFilter(this)">
                <div class="btn search-bar-reset" onclick="onClearSearchFilter()"><i class="fa-solid fa-circle-xmark"></i></div>
                <div class="tags-container">
                    <a href="#" value="happy" onclick="onTagFilter(this)">happy</a>
                    <a href="#" value="sad" onclick="onTagFilter(this)">sad</a>
                    <a href="#" value="trump" onclick="onTagFilter(this)">trump</a>
                    <a href="#" value="putin" onclick="onTagFilter(this)">putin</a>
                </div>
                <button class="expand" type="button"><i class="fa-solid fa-filter"></i></button>
                <button class="filter-btn" onclick="onToggleMenu(this)" type="button"><i class="fa-solid fa-filter"></i></button>
            </div>
            
            <div class="gallery-content"></div>
        </section>

        <section class="editor hide">
            <div class="canvas-area">
                <div class="canvas-container">
                    <canvas height="300"></canvas>
                </div>
            </div>
            <div class="canvas-tools grid">
                <div class="text-tools">
                    <input name="text-input" placeholder="Set text" class="text-input" type="text" oninput="onSetText(this)">
                    <button onclick="odAddNewTextDrawing()"><i class="fa-regular fa-square-plus"></i></button>
                    <button onclick="onRemoveText()"><i class="fa-solid fa-trash-can"></i></button>
                </div>

                <div class="text-styling">
                    <select name="text-font" id="text-font" onchange="onFontChange(this)">
                        <option value="helvetica" selected>Helvetica</option>
                        <option value="arial">Arial</option>
                        <option value="roboto">Roboto</option>
                        <option value="garamond">Garamond</option>
                        <option value="futura">Futura</option>
                    </select>
                    <div class="font-size-container">
                        <input class="font-size-slider" type="range" min="20" max="60" value="40" id="fontSizeSlide" oninput="onUpdateFontSize(this)">
                        <p>Font size <span class="font-size-value" id="fontSizeValue">40</span></p>
                    </div>
                    <input class="stroke-color" type="color" value="#000000" onchange="onSetStrokeColor(this)">
                    <input class="fill-color" type="color" value="#ffffff" onchange="onSetFontColor(this)">
                </div>

                <div class="stickers-container"> <p>temporary text</p></div>
                
                <div class="export-container">
                    <button class="save-meme" onclick="onSaveMeme()">Save meme <i class="fa-solid fa-floppy-disk"></i></button>
                    <a href="#" class="download-meme btn" onclick="onDownloadMeme(this)" download="meme.jpg">Download meme<i class="fa-solid fa-download"></i></a>
                    <button class="share-meme" onclick="onShareMeme()">Share <i class="fa-brands fa-facebook"></i></button>
                </div>
            </div>
        </section>

        <section class="about hide">
            <p>this is a test</p>
        </section>
    </main>

    <script src="https://kit.fontawesome.com/ed34b9feb9.js" crossorigin="anonymous"></script>
    <script src="js/utils/utils.service.js"></script>
    <script src="js/storage/storage.service.js"></script>
    <script src="js/items/items.service.js"></script>
    <script src="js/page/page.controller.js"></script>
    <script src="js/page/page.service.js"></script>
    <script src="js/canvas/canvas.service.js"></script>
    <script src="js/canvas/canvas.controller.js"></script>
</body>
</html>
